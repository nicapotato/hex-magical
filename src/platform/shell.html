<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hex Magical</title>
    <meta name="title" content="Hex Magical">
    <meta name="description" content="Hex Magical">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #281f1a;
            touch-action: none;
            overscroll-behavior: none;
        }
        /* Fill the itch/browser embed: no letterbox, aspect handled in-game */
        canvas.emscripten {
            border: 0 none;
            background-color: #281f1a;
            outline: none;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: monospace;
            font-size: 20px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
  </head>
  <body>
    <div id="loading">Loading...</div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script type='text/javascript'>
      // Keep the canvas framebuffer matched to the browser/itch iframe viewport.
      // Raylib's FLAG_WINDOW_RESIZABLE also syncs GetScreenWidth/Height on resize.
      function resizeCanvas() {
          var canvas = document.getElementById('canvas');
          if (!canvas) return;

          // Match raylib's web resize callback (window.innerWidth/Height) so the
          // CSS size, framebuffer, and GetScreenWidth/Height stay in lockstep.
          var finalW = Math.max(1, Math.floor(window.innerWidth));
          var finalH = Math.max(1, Math.floor(window.innerHeight));

          if (canvas.width !== finalW) canvas.width = finalW;
          if (canvas.height !== finalH) canvas.height = finalH;
          canvas.style.width = finalW + 'px';
          canvas.style.height = finalH + 'px';
      }

      var Module = {
        print: function(text) {
          console.log(text);
        },
        printErr: function(text) {
          console.warn(text);
        },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context lost. You will need to reload the page.');
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!text) return;
          var loading = document.getElementById('loading');
          if (loading) loading.innerText = text;
        },
        onRuntimeInitialized: function() {
          var loadingDiv = document.getElementById('loading');
          if (loadingDiv) loadingDiv.style.display = 'none';

          window.focus();
          document.getElementById('canvas').focus();
          resizeCanvas();
        }
      };

      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', resizeCanvas);
      if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', resizeCanvas);
      }
      document.addEventListener('DOMContentLoaded', resizeCanvas);

      document.addEventListener('touchmove', function(e) {
          e.preventDefault();
      }, { passive: false });
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
