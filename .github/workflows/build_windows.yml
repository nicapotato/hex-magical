name: Build Project - Windows

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'makefile'
      - 'Makefile.web'
      - '.github/workflows/build_windows.yml'
  release:
    types: [published]
    
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # Required for actions/upload-release-asset to upload release asset
    runs-on: windows-latest

    env:
      PROJECT_NAME: hex-magical
      PROJECT_REPO_NAME: ${{ github.event.repository.name }}
      PROJECT_BUILD_PATH: ${{ github.event.repository.name }}/build/hex-magical/Release
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_win_x64
      PROJECT_RESOURCES_SRC_PATH: src\resources
      PROJECT_RESOURCES_DST_PATH: resources

    steps:
    - name: Checkout this repo
      uses: actions/checkout@master
      with:
        path: ${{ env.PROJECT_REPO_NAME }}

    - name: Setup Release Paths
      run: |
        echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_win_x64" >> $GITHUB_ENV
      shell: bash
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Setup Environment
      run: |
        mkdir ${{ env.PROJECT_RELEASE_PATH }}
        dir
      shell: cmd

    - name: Build Product (CMake + FetchContent raylib/box2d)
      run: |
        cd ${{ env.PROJECT_REPO_NAME }}
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release --parallel
        dir build\hex-magical
        dir build\hex-magical\Release
      shell: cmd

    - name: Generate Artifacts
      shell: bash
      run: |
        set -euo pipefail
        EXE=""
        for candidate in \
          "${{ env.PROJECT_REPO_NAME }}/build/hex-magical/Release/hex-magical.exe" \
          "${{ env.PROJECT_REPO_NAME }}/build/hex-magical/hex-magical.exe" \
          "${{ env.PROJECT_REPO_NAME }}/build/Release/hex-magical.exe"
        do
          if [ -f "$candidate" ]; then EXE="$candidate"; break; fi
        done
        test -n "$EXE"
        echo "Using binary: $EXE"
        cp "$EXE" "${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.exe"
        cp -r "${{ env.PROJECT_REPO_NAME }}/src/resources" "${{ env.PROJECT_RELEASE_PATH }}/resources"
        cp "${{ env.PROJECT_REPO_NAME }}/README.md" "${{ env.PROJECT_RELEASE_PATH }}/README.md"
        cp "${{ env.PROJECT_REPO_NAME }}/LICENSE" "${{ env.PROJECT_RELEASE_PATH }}/LICENSE"
        ls -la "${{ env.PROJECT_RELEASE_PATH }}"
        7z a "./${{ env.PROJECT_RELEASE_PATH }}.zip" "./${{ env.PROJECT_RELEASE_PATH }}"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_RELEASE_PATH }}.zip
        path: |
            ./${{ env.PROJECT_RELEASE_PATH }}
            !./${{ env.PROJECT_RELEASE_PATH }}.zip

    - name: Upload Artifact to Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ env.PROJECT_RELEASE_PATH }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'
